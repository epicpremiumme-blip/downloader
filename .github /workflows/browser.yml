name: 🚀 دانلودر حرفه‌ای فایل (نسخه کامل)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های دانلود (هر لینک در یک خط جداگانه)'
        required: true
        type: string
      mode:
        description: '📦 حالت خروجی'
        required: false
        default: 'zip'
        type: choice
        options:
          - normal (فایل اصلی)
          - zip (فشرده با قابلیت تقسیم)
      password:
        description: '🔒 رمز فایل زیپ (اختیاری)'
        required: false
        type: string
      split_size:
        description: '📏 حجم هر قسمت (MB) - برای فایل‌های بزرگ'
        required: false
        default: '95'
        type: string

jobs:
  download:
    name: 📥 دانلود و آپلود فایل‌ها
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: 📂 دریافت کد ریپازیتوری
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ تنظیمات اولیه
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global http.postBuffer 524288000
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc

      - name: 📝 پردازش لینک‌ها
        id: process
        run: |
          # آماده‌سازی پوشه‌ها
          mkdir -p downloads temp_download
          BACKUP_DIR="/tmp/download_$(date +%s)"
          mkdir -p "$BACKUP_DIR"
          echo "BACKUP_DIR=$BACKUP_DIR" >> $GITHUB_ENV

          # پارامترها
          MODE="${{ github.event.inputs.mode }}"
          PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          # تابع URL encode
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # تابع دانلود با ریتری
          download_file() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            
            for ((i=1; i<=MAX_RETRIES; i++)); do
              echo "تلاش $i از $MAX_RETRIES برای دانلود $FILENAME"
              
              if aria2c --summary-interval=0 \
                --max-connection-per-server=16 \
                --split=16 \
                --min-split-size=5M \
                --max-tries=5 \
                --retry-wait=5 \
                --timeout=60 \
                --allow-overwrite=true \
                --dir="temp_download" \
                --out="$FILENAME" \
                "$URL" 2>&1; then
                
                if [ -f "temp_download/$FILENAME" ] && [ -s "temp_download/$FILENAME" ]; then
                  echo "✅ دانلود موفق: $FILENAME"
                  return 0
                fi
              fi
              
              sleep $((i * 5))
            done
            
            echo "❌ دانلود ناموفق: $FILENAME"
            return 1
          }

          # تابع ایجاد فایل README برای پوشه
          create_readme() {
            local FOLDER_PATH="$1"
            local FOLDER_NAME="$2"
            local FILE_LIST="$3"
            
            cat > "$FOLDER_PATH/README.md" << EOF
# 📦 $FOLDER_NAME

## اطلاعات دانلود
- **تاریخ:** $(date '+%Y-%m-%d %H:%M:%S')
- **تعداد فایل‌ها:** $(echo "$FILE_LIST" | wc -l)

## لینک‌های دانلود

$(echo "$FILE_LIST" | while read -r file; do
  [ -n "$file" ] && echo "- [\`$file\`]($(urlencode "$file"))"
done)

---
*توسط [دانلودر خودکار](https://github.com) تولید شده است*
EOF
          }

          # خواندن لینک‌ها
          URLS=$(echo "${{ github.event.inputs.urls }}" | sed 's/\r//g')
          SUCCESS_FILES=()
          FAILED_FILES=()

          echo "========================================="
          echo "شروع دانلود فایل‌ها..."
          echo "========================================="

          # دانلود هر لینک
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            
            # استخراج نام فایل
            FILENAME=$(basename "$URL" | sed 's/[?#&].*//' | sed 's/%20/ /g')
            [ -z "$FILENAME" ] && FILENAME="file_$(date +%s).bin"
            
            # حذف کاراکترهای غیرمجاز
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*\/\\]/_/g')
            
            echo ""
            echo "🔗 لینک: $URL"
            echo "📄 فایل: $FILENAME"
            
            if download_file "$URL" "$FILENAME"; then
              SUCCESS_FILES+=("$FILENAME")
            else
              FAILED_FILES+=("$FILENAME")
            fi
          done <<< "$URLS"

          # گزارش نهایی دانلود
          echo ""
          echo "========================================="
          echo "📊 گزارش دانلود:"
          echo "✅ موفق: ${#SUCCESS_FILES[@]} فایل"
          echo "❌ ناموفق: ${#FAILED_FILES[@]} فایل"
          echo "========================================="

          if [ ${#SUCCESS_FILES[@]} -eq 0 ]; then
            echo "❌ هیچ فایلی دانلود نشد!"
            exit 1
          fi

          echo "SUCCESS_FILES=${#SUCCESS_FILES[@]}" >> $GITHUB_ENV
          echo "BACKUP_DIR=$BACKUP_DIR" >> $GITHUB_ENV

      - name: 📦 پردازش فایل‌ها (normal یا zip)
        run: |
          MODE="${{ github.event.inputs.mode }}"
          PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          BACKUP_DIR="${{ env.BACKUP_DIR }}"
          
          SPLIT_BYTES=$((SPLIT_SIZE * 1024 * 1024))
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          get_unique_name() {
            local BASE="$1"
            local COUNTER=1
            local NEW_NAME="$BASE"
            while [ -d "$BACKUP_DIR/$NEW_NAME" ]; do
              NEW_NAME="${BASE}_${COUNTER}"
              COUNTER=$((COUNTER + 1))
            done
            echo "$NEW_NAME"
          }

          cd temp_download
          
          if [ "$MODE" = "normal" ]; then
            # حالت عادی - هر فایل جداگانه
            for FILE in *; do
              [ -f "$FILE" ] || continue
              
              SIZE=$(stat -c%s "$FILE")
              NAME_NO_EXT="${FILE%.*}"
              FOLDER_NAME=$(get_unique_name "$NAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              
              if [ $SIZE -gt $SPLIT_BYTES ]; then
                echo "📦 فایل بزرگ: تقسیم $FILE به قطعات ${SPLIT_SIZE}MB"
                
                # ساخت فایل زیپ تقسیم شده
                if [ -n "$PASSWORD" ]; then
                  zip -j -P "$PASSWORD" -s ${SPLIT_SIZE}m \
                    "$BACKUP_DIR/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_SIZE}m \
                    "$BACKUP_DIR/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                fi
                
                # ساخت لینک‌های دانلود برای README
                {
                  echo "# $FILE"
                  echo ""
                  echo "## فایل تقسیم شده به ${SPLIT_SIZE}MB"
                  echo ""
                  echo "| قسمت | فایل | لینک دانلود |"
                  echo "|------|------|--------------|"
                  
                  for PART in $(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z* 2>/dev/null | sort -V); do
                    PART_NAME=$(basename "$PART")
                    PART_ENCODED=$(urlencode "$PART_NAME")
                    echo "| - | \`$PART_NAME\` | [دانلود](${{ github.server_url }}/${{ github.repository }}/raw/${GITHUB_REF_NAME}/downloads/${FOLDER_NAME}/$PART_ENCODED) |"
                  done
                } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
                
              else
                # فایل کوچک - زیپ ساده
                if [ -n "$PASSWORD" ]; then
                  zip -j -P "$PASSWORD" \
                    "$BACKUP_DIR/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                else
                  zip -j \
                    "$BACKUP_DIR/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                fi
                
                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                FILE_ENCODED=$(urlencode "$FOLDER_NAME.zip")
                RAW_LINK="${{ github.server_url }}/${{ github.repository }}/raw/${GITHUB_REF_NAME}/downloads/${FOLDER_NAME}/$FILE_ENCODED"
                
                cat > "$BACKUP_DIR/$FOLDER_NAME/README.md" << EOF
# $FILE

## اطلاعات
- **حجم:** ${SIZE_MB} MB
- **رمز:** $( [ -n "$PASSWORD" ] && echo "دارد" || echo "ندارد" )

## لینک دانلود
[دانلود فایل]($RAW_LINK)

---
*توسط دانلودر خودکار*
EOF
              fi
            done
            
          else
            # حالت زیپ - همه فایل‌ها در یک آرشیو
            ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
            FOLDER_NAME=$(get_unique_name "$ARCHIVE_NAME")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            
            FILE_ARRAY=()
            for FILE in *; do
              [ -f "$FILE" ] && FILE_ARRAY+=("$FILE")
            done
            
            if [ ${#FILE_ARRAY[@]} -gt 0 ]; then
              if [ -n "$PASSWORD" ]; then
                zip -j -P "$PASSWORD" -s ${SPLIT_SIZE}m \
                  "$BACKUP_DIR/$FOLDER_NAME/$ARCHIVE_NAME.zip" "${FILE_ARRAY[@]}"
              else
                zip -j -s ${SPLIT_SIZE}m \
                  "$BACKUP_DIR/$FOLDER_NAME/$ARCHIVE_NAME.zip" "${FILE_ARRAY[@]}"
              fi
              
              # ساخت README برای آرشیو
              {
                echo "# $ARCHIVE_NAME"
                echo ""
                echo "## آرشیو شامل ${#FILE_ARRAY[@]} فایل"
                echo ""
                echo "| قسمت | فایل | لینک دانلود |"
                echo "|------|------|--------------|"
                
                for PART in $(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z* 2>/dev/null | sort -V); do
                  PART_NAME=$(basename "$PART")
                  PART_ENCODED=$(urlencode "$PART_NAME")
                  echo "| - | \`$PART_NAME\` | [دانلود](${{ github.server_url }}/${{ github.repository }}/raw/${GITHUB_REF_NAME}/downloads/${FOLDER_NAME}/$PART_ENCODED) |"
                done
              } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            fi
          fi

      - name: 📤 آپلود فایل‌ها به ریپازیتوری
        run: |
          BACKUP_DIR="${{ env.BACKUP_DIR }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          if [ ! -d "$BACKUP_DIR" ] || [ -z "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            echo "⚠️ چیزی برای آپلود وجود ندارد"
            exit 0
          fi
          
          # همگام‌سازی با ریپازیتوری
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH" 2>/dev/null || true
          
          # کپی فایل‌ها
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/
          
          # ساخت فهرست اصلی دانلودها
          cat > downloads/README.md << 'EOF'
# 📂 فایل‌های دانلود شده

## لیست پوشه‌ها

EOF
          
          for folder in downloads/*/; do
            if [ -d "$folder" ] && [ -f "$folder/README.md" ]; then
              FOLDER_NAME=$(basename "$folder")
              echo "- [📁 $FOLDER_NAME](./$FOLDER_NAME/)" >> downloads/README.md
            fi
          done
          
          echo "" >> downloads/README.md
          echo "---" >> downloads/README.md
          echo "*تاریخ بروزرسانی: $(date '+%Y-%m-%d %H:%M:%S')*" >> downloads/README.md
          
          # اضافه کردن لینک به README اصلی
          if ! grep -q "فایل‌های دانلود شده" README.md 2>/dev/null; then
            cat >> README.md << 'EOF'

---
## 📦 فایل‌های دانلود شده

برای مشاهده فایل‌های دانلود شده به پوشه [`downloads/`](./downloads/) مراجعه کنید.

[📂 مشاهده همه فایل‌ها](./downloads/)

EOF
          fi
          
          # آپلود تدریجی فایل‌ها
          echo "🔄 شروع آپلود فایل‌ها..."
          
          # آپلود پوشه‌ها به صورت جداگانه
          for folder in downloads/*/; do
            if [ -d "$folder" ]; then
              echo "📤 آپلود: $(basename "$folder")"
              git add "$folder" 2>/dev/null || true
              
              # هر ۵ ثانیه یک بار commit کن
              if ! git diff --cached --quiet; then
                git commit -m "Add download: $(basename "$folder") [skip ci]" --quiet
                
                # آپلود با ریتری
                for i in 1 2 3 4 5; do
                  if git push origin HEAD:"$BRANCH" --quiet 2>/dev/null; then
                    echo "  ✅ آپلود شد"
                    break
                  fi
                  echo "  ⏳ تلاش مجدد $i/5..."
                  sleep 5
                done
              fi
            fi
          done
          
          # آپلود README ها
          git add downloads/README.md README.md
          if ! git diff --cached --quiet; then
            git commit -m "Update download list [skip ci]" --quiet
            git push origin HEAD:"$BRANCH" --quiet || true
          fi
          
          echo "✅ تمام فایل‌ها با موفقیت آپلود شدند"

      - name: 📊 نمایش گزارش نهایی
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "🎉 فرآیند دانلود با موفقیت کامل شد!"
          echo "========================================="
          echo ""
          echo "📁 فایل‌های دانلود شده در پوشه downloads/ قرار دارند:"
          echo "🔗 ${{ github.server_url }}/${{ github.repository }}/tree/${GITHUB_REF_NAME}/downloads"
          echo ""
          echo "========================================="
