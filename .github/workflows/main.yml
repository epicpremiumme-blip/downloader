name: 01- 🔥 دانلود فایل (نسخه کامل)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: "📥 دانلود فایل"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip curl pv

      - name: Download Files with wget
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE=90
          
          mkdir -p downloads temp_files
          
          for URL in $URLS; do
            FILENAME=$(basename "$URL" | cut -d'?' -f1 | cut -d'#' -f1)
            echo "========================================="
            echo "Downloading: $FILENAME"
            echo "========================================="
            
            cd temp_files
            
            # حذف فایل قبلی
            rm -f "$FILENAME"
            
            # دانلود با wget (قوی‌تر از aria2c برای ریدایرکت‌ها)
            wget --no-check-certificate \
                 --tries=10 \
                 --retry-connrefused \
                 --timeout=60 \
                 --waitretry=5 \
                 --continue \
                 --progress=dot:giga \
                 --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 -O "$FILENAME" \
                 "$URL"
            
            # بررسی حجم فایل
            if [ -f "$FILENAME" ]; then
              DOWNLOADED_SIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo "0")
              SIZE_MB=$((DOWNLOADED_SIZE / 1024 / 1024))
              echo "Downloaded size: ${SIZE_MB} MB"
              
              # اگر فایل خیلی کوچک بود، با curl دوباره تلاش کن
              if [ $DOWNLOADED_SIZE -lt 5000000 ]; then
                echo "File too small, retrying with curl..."
                curl -L --max-time 3600 --retry 10 --retry-delay 5 \
                  -A "Mozilla/5.0" \
                  -o "$FILENAME" \
                  "$URL"
                
                DOWNLOADED_SIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo "0")
                SIZE_MB=$((DOWNLOADED_SIZE / 1024 / 1024))
                echo "New size: ${SIZE_MB} MB"
              fi
            else
              echo "Download failed!"
              exit 1
            fi
            
            cd ..
            
            # دریافت حجم نهایی
            FILE_SIZE=$(stat -c%s "temp_files/$FILENAME" 2>/dev/null || echo "0")
            SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "Final file size: ${SIZE_MB} MB"
            
            if [ $FILE_SIZE -lt 1000000 ]; then
              echo "ERROR: Download failed - file too small (${SIZE_MB} MB)"
              exit 1
            fi
            
            # پردازش فایل
            if [ "$MODE" = "zip" ]; then
              if [ $FILE_SIZE -gt $((SPLIT_SIZE * 1024 * 1024)) ]; then
                echo "Splitting into ${SPLIT_SIZE}MB parts..."
                cd temp_files
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                else
                  zip -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                fi
                mv "${FILENAME}.zip"* ../downloads/
                cd ..
              else
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" "downloads/${FILENAME}.zip" "temp_files/$FILENAME"
                else
                  zip "downloads/${FILENAME}.zip" "temp_files/$FILENAME"
                fi
              fi
            else
              if [ $FILE_SIZE -gt $((SPLIT_SIZE * 1024 * 1024)) ]; then
                echo "File too large (${SIZE_MB}MB), splitting into ${SPLIT_SIZE}MB parts..."
                cd temp_files
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                else
                  zip -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                fi
                mv "${FILENAME}.zip"* ../downloads/
                cd ..
              else
                mv "temp_files/$FILENAME" "downloads/"
              fi
            fi
            
            rm -f temp_files/*
            echo "✅ $FILENAME processed successfully"
          done
          
          rm -rf temp_files
          echo "========================================="
          echo "✅ All downloads completed!"
          echo "========================================="

      - name: Verify downloads
        run: |
          echo ""
          echo "========================================="
          echo "Verifying downloaded files..."
          echo "========================================="
          
          TOTAL_SIZE=0
          FILE_COUNT=0
          
          for FILE in downloads/*; do
            if [ -f "$FILE" ] && [ "$(basename "$FILE")" != "README.md" ]; then
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              echo "- $(basename "$FILE"): ${SIZE_MB} MB"
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              FILE_COUNT=$((FILE_COUNT + 1))
            fi
          done
          
          TOTAL_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo ""
          echo "Total: $FILE_COUNT files, ${TOTAL_MB} MB"
          echo "========================================="

      - name: Create README files
        run: |
          # ساخت README برای پوشه downloads
          echo "# Downloaded Files" > downloads/README.md
          echo "" >> downloads/README.md
          echo "| # | File | Size (MB) | Link |" >> downloads/README.md
          echo "|---|------|-----------|------|" >> downloads/README.md
          
          COUNTER=1
          for FILE in downloads/*; do
            if [ -f "$FILE" ] && [ "$(basename "$FILE")" != "README.md" ]; then
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              echo "| $COUNTER | \`$BASENAME\` | $SIZE_MB | [Download](./$BASENAME) |" >> downloads/README.md
              COUNTER=$((COUNTER + 1))
            fi
          done
          
          # آپدیت README اصلی
          if ! grep -q "Downloaded Files" README.md 2>/dev/null; then
            echo "" >> README.md
            echo "---" >> README.md
            echo "## Downloaded Files" >> README.md
            echo "" >> README.md
            echo "Check the [downloads folder](./downloads) for downloaded files." >> README.md
          fi

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ README.md
          
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files [skip ci]"
            
            for i in 1 2 3; do
              if git push origin HEAD:"${GITHUB_REF_NAME}"; then
                echo "✅ Push successful!"
                break
              else
                echo "⚠️ Retry $i/3..."
                sleep 5
                git pull origin "${GITHUB_REF_NAME}" --rebase || true
              fi
            done
          else
            echo "No new files to push"
          fi

      - name: Show result
        run: |
          echo ""
          echo "========================================="
          echo "🎉 Download completed successfully!"
          echo "========================================="
          echo ""
          echo "📁 Files in downloads folder:"
          ls -lh downloads/
          echo ""
          echo "🔗 View files at:"
          echo "${{ github.server_url }}/${{ github.repository }}/tree/${GITHUB_REF_NAME}/downloads"
          echo ""
          echo "========================================="
