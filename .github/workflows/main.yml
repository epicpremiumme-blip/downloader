name: 01- 🔥 دانلود فایل (نسخه کامل)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: "📥 دانلود فایل"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl wget

      - name: Download and Split Files
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE=90
          
          mkdir -p downloads temp_files
          
          for URL in $URLS; do
            FILENAME=$(basename "$URL" | cut -d'?' -f1 | cut -d'#' -f1)
            echo "========================================="
            echo "Downloading: $FILENAME"
            echo "========================================="
            
            # دانلود فایل با aria2c و بررسی کامل
            cd temp_files
            
            # حذف فایل قبلی اگر ناقص بوده
            rm -f "$FILENAME" "$FILENAME.aria2"
            
            # دانلود با aria2c و ادامه دانلود ناقص
            aria2c -x 16 -s 16 -k 5M \
              --max-connection-per-server=16 \
              --split=16 \
              --min-split-size=5M \
              --max-tries=10 \
              --retry-wait=5 \
              --timeout=60 \
              --continue=true \
              --allow-overwrite=true \
              --summary-interval=5 \
              -d . -o "$FILENAME" "$URL"
            
            # بررسی حجم فایل دانلود شده
            if [ -f "$FILENAME" ]; then
              DOWNLOADED_SIZE=$(stat -c%s "$FILENAME")
              echo "Downloaded size: $DOWNLOADED_SIZE bytes"
              
              # منتظر میمونیم تا aria2c واقعاً تموم بشه
              sleep 3
            else
              echo "Download failed! Trying with wget..."
              wget -O "$FILENAME" "$URL"
            fi
            
            cd ..
            
            # بررسی نهایی حجم فایل
            if [ -f "temp_files/$FILENAME" ]; then
              FILE_SIZE=$(stat -c%s "temp_files/$FILENAME")
              SIZE_MB=$((FILE_SIZE / 1024 / 1024))
              echo "Final file size: ${SIZE_MB} MB"
              
              if [ $FILE_SIZE -lt 1000000 ]; then
                echo "ERROR: File too small, download may have failed!"
                exit 1
              fi
            else
              echo "ERROR: File not found after download!"
              exit 1
            fi
            
            # پردازش فایل
            if [ "$MODE" = "zip" ]; then
              if [ $FILE_SIZE -gt $((SPLIT_SIZE * 1024 * 1024)) ]; then
                echo "Splitting into ${SPLIT_SIZE}MB parts..."
                cd temp_files
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                else
                  zip -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                fi
                mv "${FILENAME}.zip"* ../downloads/
                cd ..
              else
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" "downloads/${FILENAME}.zip" "temp_files/$FILENAME"
                else
                  zip "downloads/${FILENAME}.zip" "temp_files/$FILENAME"
                fi
              fi
            else
              if [ $FILE_SIZE -gt $((SPLIT_SIZE * 1024 * 1024)) ]; then
                echo "File too large (${SIZE_MB}MB), splitting into ${SPLIT_SIZE}MB parts..."
                cd temp_files
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                else
                  zip -s ${SPLIT_SIZE}m "${FILENAME}.zip" "$FILENAME"
                fi
                mv "${FILENAME}.zip"* ../downloads/
                cd ..
              else
                mv "temp_files/$FILENAME" "downloads/"
              fi
            fi
            
            # پاکسازی
            rm -f temp_files/*
          done
          
          rm -rf temp_files
          echo "========================================="
          echo "✅ Download completed!"
          echo "========================================="

      - name: List downloaded files
        run: |
          echo ""
          echo "Files in downloads folder:"
          ls -lh downloads/
          echo ""
          
          # نمایش حجم کل
          TOTAL_SIZE=0
          for FILE in downloads/*; do
            if [ -f "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE")
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
            fi
          done
          TOTAL_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "Total size: ${TOTAL_MB} MB"

      - name: Create README files
        run: |
          # ساخت README برای پوشه downloads
          echo "# Downloaded Files" > downloads/README.md
          echo "" >> downloads/README.md
          echo "| # | File | Size | Link |" >> downloads/README.md
          echo "|---|------|------|------|" >> downloads/README.md
          
          COUNTER=1
          for FILE in downloads/*; do
            if [ -f "$FILE" ] && [ "$(basename "$FILE")" != "README.md" ]; then
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              echo "| $COUNTER | \`$BASENAME\` | ${SIZE_MB} MB | [Download](./$BASENAME) |" >> downloads/README.md
              COUNTER=$((COUNTER + 1))
            fi
          done
          
          # آپدیت README اصلی
          if ! grep -q "Downloaded Files" README.md; then
            echo "" >> README.md
            echo "---" >> README.md
            echo "## Downloaded Files" >> README.md
            echo "" >> README.md
            echo "Check the [downloads folder](./downloads) for downloaded files." >> README.md
          fi

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ README.md
          
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files [skip ci]"
            
            for i in 1 2 3; do
              if git push origin HEAD:"${GITHUB_REF_NAME}"; then
                echo "✅ Push successful!"
                break
              else
                echo "⚠️ Retry $i/3..."
                sleep 5
                git pull origin "${GITHUB_REF_NAME}" --rebase
              fi
            done
          else
            echo "No new files to push"
          fi

      - name: Show result
        run: |
          echo ""
          echo "========================================="
          echo "🎉 Download completed successfully!"
          echo "========================================="
          echo ""
          echo "📁 Files in downloads folder:"
          ls -lh downloads/
          echo ""
          echo "🔗 View files at:"
          echo "${{ github.server_url }}/${{ github.repository }}/tree/${GITHUB_REF_NAME}/downloads"
          echo ""
          echo "========================================="
