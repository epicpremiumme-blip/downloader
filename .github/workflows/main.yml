name: 01- 🔥 دانلود فایل (نسخه کامل)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: "📥 دانلود فایل"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl

      - name: Download files
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          PASSWORD="${{ github.event.inputs.password }}"
          
          mkdir -p downloads
          
          for URL in $URLS; do
            FILENAME=$(basename "$URL" | cut -d'?' -f1 | cut -d'#' -f1)
            echo "Downloading: $FILENAME"
            
            # دانلود فایل
            aria2c -x 16 -s 16 -k 5M --allow-overwrite=true -d . -o "$FILENAME" "$URL" || \
            curl -L -o "$FILENAME" "$URL"
            
            if [ "$MODE" = "zip" ]; then
              # حالت زیپ - فشرده سازی
              if [ -n "$PASSWORD" ]; then
                zip -P "$PASSWORD" "${FILENAME}.zip" "$FILENAME"
              else
                zip "${FILENAME}.zip" "$FILENAME"
              fi
              mv "${FILENAME}.zip" downloads/
              rm -f "$FILENAME"
            else
              # حالت عادی - انتقال مستقیم
              mv "$FILENAME" downloads/
            fi
          done
          
          echo "✅ Download completed!"

      - name: Update README
        run: |
          # ساخت لیست دانلودها
          echo "# Downloaded Files" > downloads/README.md
          echo "" >> downloads/README.md
          echo "| File | Link |" >> downloads/README.md
          echo "|------|------|" >> downloads/README.md
          
          for FILE in downloads/*; do
            if [ -f "$FILE" ]; then
              BASENAME=$(basename "$FILE")
              echo "| $BASENAME | [Download](./$BASENAME) |" >> downloads/README.md
            fi
          done
          
          # آپدیت README اصلی
          echo "" >> README.md
          echo "---" >> README.md
          echo "## 📦 Downloaded Files" >> README.md
          echo "" >> README.md
          echo "Check [downloads folder](./downloads) for downloaded files." >> README.md

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ README.md
          git commit -m "Add downloaded files [skip ci]" || echo "Nothing to commit"
          git push
