name: 01- 🔥 دانلود فایل (نسخه کامل)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: "📥 دانلود فایل"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global http.postBuffer 524288000

      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ لینک دانلود وارد نشده است!"
            exit 1
          fi
          echo "✅ لینک دانلود دریافت شد"

      - name: Download and Process Files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE=95

          mkdir -p downloads temp_download
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # دانلود فایل‌ها
          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/[?#&].*//' | sed 's/%20/ /g')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            
            echo "📥 دانلود: $FILENAME"
            
            aria2c --max-connection-per-server=16 \
                   --split=16 \
                   --min-split-size=5M \
                   --max-tries=3 \
                   --retry-wait=5 \
                   --timeout=60 \
                   --allow-overwrite=true \
                   --dir="temp_download" \
                   --out="$FILENAME" \
                   "$URL" || curl -L -o "temp_download/$FILENAME" "$URL"
          done

          # پردازش فایل‌ها
          if [ "$MODE" = "zip" ]; then
            FOLDER_NAME="archive_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "downloads/$FOLDER_NAME"
            
            cd temp_download
            if [ -n "$PASSWORD" ]; then
              zip -j -P "$PASSWORD" -s ${SPLIT_SIZE}m "../downloads/$FOLDER_NAME/$FOLDER_NAME.zip" *
            else
              zip -j -s ${SPLIT_SIZE}m "../downloads/$FOLDER_NAME/$FOLDER_NAME.zip" *
            fi
            cd ..
            
            # ساخت README
            printf "# آرشیو دانلود\n\n" > "downloads/$FOLDER_NAME/README.md"
            printf "تاریخ: $(date '+%Y-%m-%d %H:%M:%S')\n\n" >> "downloads/$FOLDER_NAME/README.md"
            printf "## فایل‌های آرشیو:\n" >> "downloads/$FOLDER_NAME/README.md"
            for f in temp_download/*; do
              [ -f "$f" ] && printf "- $(basename "$f")\n" >> "downloads/$FOLDER_NAME/README.md"
            done
            printf "\n## لینک‌های دانلود:\n" >> "downloads/$FOLDER_NAME/README.md"
            
            for PART in $(ls "downloads/$FOLDER_NAME/"*.zip "downloads/$FOLDER_NAME/"*.z* 2>/dev/null | sort); do
              PART_NAME=$(basename "$PART")
              PART_ENCODED=$(urlencode "$PART_NAME")
              printf "- [%s](https://raw.githubusercontent.com/%s/${GITHUB_REF_NAME}/downloads/%s/%s)\n" "$PART_NAME" "${{ github.repository }}" "$FOLDER_NAME" "$PART_ENCODED" >> "downloads/$FOLDER_NAME/README.md"
            done
            
          else
            for FILE in temp_download/*; do
              [ -f "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              FOLDER_NAME="$BASENAME_NO_EXT"
              
              COUNTER=1
              while [ -d "downloads/$FOLDER_NAME" ]; do
                FOLDER_NAME="${BASENAME_NO_EXT}_${COUNTER}"
                COUNTER=$((COUNTER + 1))
              done
              
              mkdir -p "downloads/$FOLDER_NAME"
              SIZE=$(stat -c%s "$FILE")
              
              if [ $SIZE -gt $((SPLIT_SIZE * 1024 * 1024)) ]; then
                if [ -n "$PASSWORD" ]; then
                  zip -j -P "$PASSWORD" -s ${SPLIT_SIZE}m "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_SIZE}m "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                fi
              else
                if [ -n "$PASSWORD" ]; then
                  zip -j -P "$PASSWORD" "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                else
                  zip -j "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" "$FILE"
                fi
              fi
              
              SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
              
              printf "# %s\n\n" "$BASENAME" > "downloads/$FOLDER_NAME/README.md"
              printf "- حجم اصلی: ${SIZE_MB} MB\n" >> "downloads/$FOLDER_NAME/README.md"
              printf "- تاریخ: $(date '+%Y-%m-%d %H:%M:%S')\n" >> "downloads/$FOLDER_NAME/README.md"
              printf "- رمز: " >> "downloads/$FOLDER_NAME/README.md"
              if [ -n "$PASSWORD" ]; then
                printf "دارد\n\n" >> "downloads/$FOLDER_NAME/README.md"
              else
                printf "ندارد\n\n" >> "downloads/$FOLDER_NAME/README.md"
              fi
              printf "## لینک دانلود:\n\n" >> "downloads/$FOLDER_NAME/README.md"
              
              if [ -f "downloads/$FOLDER_NAME/$FOLDER_NAME.zip" ]; then
                FILE_ENCODED=$(urlencode "$FOLDER_NAME.zip")
                printf "[دانلود فایل](https://raw.githubusercontent.com/%s/${GITHUB_REF_NAME}/downloads/%s/%s)\n" "${{ github.repository }}" "$FOLDER_NAME" "$FILE_ENCODED" >> "downloads/$FOLDER_NAME/README.md"
              else
                for PART in $(ls "downloads/$FOLDER_NAME/"*.zip "downloads/$FOLDER_NAME/"*.z* 2>/dev/null | sort); do
                  PART_NAME=$(basename "$PART")
                  PART_ENCODED=$(urlencode "$PART_NAME")
                  printf "- [%s](https://raw.githubusercontent.com/%s/${GITHUB_REF_NAME}/downloads/%s/%s)\n" "$PART_NAME" "${{ github.repository }}" "$FOLDER_NAME" "$PART_ENCODED" >> "downloads/$FOLDER_NAME/README.md"
                done
              fi
            done
          fi
          
          rm -rf temp_download
          echo "✅ پردازش فایل‌ها کامل شد"

      - name: Update Main README
        run: |
          # ساخت فایل README برای پوشه downloads
          {
            echo "# 📂 لیست فایل‌های دانلود شده"
            echo ""
          } > downloads/README.md
          
          for folder in downloads/*/; do
            if [ -d "$folder" ]; then
              FOLDER_NAME=$(basename "$folder")
              echo "- [📁 $FOLDER_NAME](./$FOLDER_NAME/)" >> downloads/README.md
            fi
          done
          
          # اطمینان از وجود README اصلی
          if [ ! -f README.md ]; then
            echo "# Downloader" > README.md
            echo "" >> README.md
          fi
          
          # اضافه کردن بخش دانلودها به README اصلی
          if ! grep -q "فایل های دانلود شده در گیتهاب شما" README.md; then
            {
              echo ""
              echo "---"
              echo ""
              echo "## فایل های دانلود شده در گیتهاب شما :"
              echo ""
              echo "برای مشاهده فایل‌های دانلود شده به پوشه [\`downloads/\`](./downloads/) مراجعه کنید."
              echo ""
            } >> README.md
          fi

      - name: Commit and Push
        run: |
          git add downloads/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}" || {
              echo "⚠️ پوش ناموفق، تلاش مجدد..."
              sleep 5
              git pull origin "${GITHUB_REF_NAME}" --rebase
              git push origin HEAD:"${GITHUB_REF_NAME}"
            }
            echo "✅ آپلود موفقیت‌آمیز بود"
          else
            echo "ℹ️ هیچ فایل جدیدی برای آپلود وجود ندارد"
          fi

      - name: Show Result
        run: |
          echo ""
          echo "========================================="
          echo "🎉 دانلود با موفقیت انجام شد!"
          echo "========================================="
          echo ""
          echo "📁 فایل‌ها در پوشه downloads/ قرار دارند:"
          echo "🔗 ${{ github.server_url }}/${{ github.repository }}/tree/${GITHUB_REF_NAME}/downloads"
          echo ""
          echo "📄 لیست فایل‌ها:"
          find downloads -type f \( -name "*.zip" -o -name "*.z*" -o -name "README.md" \) | head -20
          echo ""
          echo "========================================="
